{% extends 'election_core/base.html' %}
{% load static %}

{% block title %}Forgot Password | FlashVote{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[80vh] bg-slate-50 px-4 py-12">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold text-slate-900 tracking-tight">Reset Password</h2>
            <p class="text-slate-500 mt-2 font-medium">Verify your email to continue</p>
        </div>

        <div class="bg-white rounded-3xl border border-slate-200 p-10 shadow-sm">
            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div class="form-control">
                    <label class="label p-0 mb-1"><span class="label-text text-[10px] font-bold text-slate-400 uppercase tracking-widest">Registered Email</span></label>
                    <input type="email" name="email" required placeholder="name@institution.com" class="input input-bordered w-full h-14 rounded-xl font-medium focus:border-indigo-600 focus:bg-slate-50 transition-all">
                </div>

                <div class="pt-4">
                    <button type="submit" class="btn btn-primary w-full h-14 rounded-xl font-bold uppercase tracking-widest text-xs shadow-lg shadow-indigo-100">
                        Send Verification Code
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-50 text-center">
                <a href="{% url 'login' %}" class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest hover:underline">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
