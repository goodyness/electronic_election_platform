{% extends 'election_core/base.html' %}

{% block title %}Forgot Password | FlashVote{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md">

        <div class="text-center mb-10">
            <div
                class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">Forgot Password?</h2>
            <p class="text-slate-500 mt-2 px-4">Enter your registered email and we'll send a code to reset your
                password.</p>
        </div>

        <div class="card bg-white shadow-xl shadow-slate-200/60 border border-slate-100 rounded-3xl p-8 lg:p-10">
            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <div class="form-control">
                    <label class="label">
                        <span class="label-text font-bold text-slate-700">Email Address</span>
                    </label>
                    <div class="relative group">
                        <span
                            class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400 group-focus-within:text-indigo-600 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                            </svg>
                        </span>
                        <input type="email" name="email" required placeholder="name@institution.com"
                            class="input input-bordered w-full pl-11 rounded-xl bg-slate-50 focus:bg-white focus:border-indigo-600 focus:ring-0 transition-all">
                    </div>
                </div>

                <div class="pt-2">
                    <button type="submit"
                        class="btn btn-primary w-100 rounded-xl h-12 shadow-lg shadow-indigo-100 font-bold normal-case">
                        Send Reset Code
                    </button>
                </div>
            </form>

            <div class="mt-8 pt-8 border-t border-slate-100 text-center">
                <p class="text-sm text-slate-500">
                    Remembered it?
                    <a href="{% url 'login' %}"
                        class="font-bold text-indigo-600 hover:text-indigo-700 transition-colors">Back to Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
