<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>War Room | {{ election.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.9"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .grid-bg { background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px; }
    </style>
</head>
<body class="min-h-screen grid-bg relative">
    <div class="max-w-7xl mx-auto py-10 px-6 space-y-8">
        <!-- Tactical Header -->
        <header class="bg-slate-900/80 backdrop-blur-md rounded-3xl border border-slate-800 p-8 flex flex-col md:flex-row justify-between items-center gap-8 shadow-2xl">
            <div class="text-center md:text-left">
                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-rose-500/10 border border-rose-500/30 text-rose-500 text-[9px] font-bold uppercase tracking-widest mb-4">
                    <span class="relative flex h-2 w-2">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2 w-2 bg-rose-600"></span>
                    </span>
                    Live Feed Active
                </div>
                <h1 class="text-4xl md:text-5xl font-bold text-white tracking-tight uppercase">{{ election.title }}</h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-2">{{ election.institution.name }}</p>
            </div>

            <div class="flex flex-col items-center md:items-end gap-4">
                <div class="text-right">
                    <div class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1">Network Time</div>
                    <div class="text-3xl font-bold text-white font-mono" id="clock">00:00:00</div>
                </div>
                <a href="{% url 'organizer_dashboard' %}" class="btn btn-sm btn-ghost border border-slate-800 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-white h-10 px-6">Exit Room</a>
            </div>
        </header>

        <!-- Dynamic Content -->
        <div id="results-container" 
             hx-get="{% url 'result_war_room' short_id=election.short_id %}" 
             hx-trigger="every {{ refresh_interval }}s" 
             hx-swap="innerHTML">
            {% include 'election_core/result_war_room_partial.html' %}
        </div>

        <footer class="text-center flex justify-center py-6">
            <div class="inline-flex items-center gap-4 px-6 py-2 bg-slate-900 border border-slate-800 rounded-full text-[9px] font-bold text-slate-500 uppercase tracking-widest">
                <span>FV-CORE v4.0</span>
                <span class="w-1 h-1 bg-slate-700 rounded-full"></span>
                <span class="text-emerald-500">Grid Optimal</span>
                <span class="w-1 h-1 bg-slate-700 rounded-full"></span>
                <span>Encrypted AES-256</span>
            </div>
        </footer>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB', { hour12: false });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
