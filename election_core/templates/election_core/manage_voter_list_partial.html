{% for item in page_obj %}
<tr class="hover:bg-slate-50/50">
    <td class="px-6 py-4 font-medium text-slate-700">{{ item.email }}</td>
    <td class="px-6 py-4 text-right">
        <a href="{% url 'delete_allowed_email' item.id %}" onclick="return confirm('Remove {{ item.email }}?')" class="text-rose-500 hover:underline font-bold text-xs">Remove</a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="2" class="text-center py-20 text-slate-400 italic">No voters added yet.</td>
</tr>
{% endfor %}

{% if page_obj.has_other_pages %}
<tr class="bg-white">
    <td colspan="2" class="p-4 border-t border-slate-100">
        <div class="flex justify-center">
            <div class="join">
                {% if page_obj.has_previous %}
                <button hx-get="?page={{ page_obj.previous_page_number }}" hx-target="#voter-list-body" hx-swap="innerHTML" hx-push-url="true" class="btn btn-xs rounded-l-lg h-9 px-4">«</button>
                {% endif %}
                <span class="btn btn-xs h-9 px-4 bg-white border-slate-200 text-slate-500 pointer-events-none">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>
                {% if page_obj.has_next %}
                <button hx-get="?page={{ page_obj.next_page_number }}" hx-target="#voter-list-body" hx-swap="innerHTML" hx-push-url="true" class="btn btn-xs rounded-r-lg h-9 px-4">»</button>
                {% endif %}
            </div>
        </div>
    </td>
</tr>
{% endif %}
