<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Organizer Account Approved</title>
</head>
<body style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; color: #1e293b; background-color: #ffffff; margin: 0; padding: 40px 20px;">
    <div style="max-width: 600px; margin: 0 auto; border: 1px solid #f1f5f9; border-radius: 32px; padding: 48px; shadow: 0 4px 6px rgba(0,0,0,0.02);">
        <div style="margin-bottom: 32px;">
            <div style="width: 32px; height: 32px; background: #4f46e5; border-radius: 8px; display: inline-block;"></div>
            <span style="font-size: 18px; font-weight: 800; color: #0f172a; vertical-align: middle; margin-left: 8px; letter-spacing: -0.025em;">FlashVote</span>
        </div>

        <h1 style="font-size: 32px; font-weight: 800; color: #0f172a; margin-bottom: 16px; letter-spacing: -0.05em;">Access Granted</h1>
        <p style="font-size: 16px; color: #64748b; margin-bottom: 32px;">Your application for an Organizer account has been approved. You now have full access to the election management core.</p>

        <div style="padding: 24px; background: #f8fafc; border-radius: 20px; margin-bottom: 32px;">
            <p style="margin: 0; font-size: 14px; font-weight: 700; color: #4f46e5; text-transform: uppercase; letter-spacing: 0.1em;">Organizer</p>
            <p style="margin: 4px 0 0 0; font-size: 18px; font-weight: 800; color: #0f172a;">{{ full_name }}</p>
        </div>

        <a href="{{ dashboard_url }}" style="display: inline-block; background: #4f46e5; color: #ffffff; text-decoration: none; padding: 16px 32px; border-radius: 16px; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Initialize Console →</a>

        <div style="margin-top: 48px; padding-top: 32px; border-top: 1px solid #f1f5f9; color: #94a3b8; font-size: 12px;">
            <p>&copy; {{ current_year }} FlashVote. Built for Institutional Integrity.</p>
        </div>
    </div>
</body>
</html>
