{% extends 'emails/base_email.html' %}

{% block content %}
<style>
    .otp-code {
        font-size: 32px;
        font-weight: 800;
        color: #4f46e5;
        letter-spacing: 5px;
        text-align: center;
        margin: 32px 0;
        padding: 24px;
        background: #f8fafc;
        border-radius: 16px;
        border: 1px dashed #e2e8f0;
    }
</style>

<h2 style="color: #0f172a; font-size: 24px; font-weight: 800; margin-bottom: 8px;">Verification Required</h2>
<p style="color: #64748b; margin-bottom: 32px;">Please use the following code for <strong>{{ purpose_text }}</strong>.</p>

<div class="otp-code">{{ otp_code }}</div>

<p style="font-size: 14px; color: #64748b;">This code will expire in 10 minutes for your security. If you did not request this, please ignore this email.</p>
{% endblock %}
