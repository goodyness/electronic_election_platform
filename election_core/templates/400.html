{% extends 'election_core/base.html' %}

{% block title %}400 - Bad Transmission{% endblock %}

{% block content %}
<div class="min-h-screen bg-white flex flex-col items-center justify-center p-6 text-center">
    <div class="w-32 h-32 rounded-[2.5rem] bg-rose-50 flex items-center justify-center text-rose-600 mb-8 border border-rose-100">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
    </div>
    
    <div class="max-w-md space-y-8">
        <div>
            <h1 class="text-5xl font-black text-slate-900 leading-none tracking-tight mb-4">400</h1>
            <h2 class="text-xl font-bold text-slate-900 uppercase tracking-tight mb-2">Protocol Mismatch</h2>
            <p class="text-sm font-medium text-slate-400 leading-relaxed uppercase tracking-wider">
                The incoming request data is malformed and could not be parsed by the tactical gateway.
            </p>
        </div>

        <div class="h-px bg-slate-100 w-24 mx-auto"></div>

        <div class="flex flex-col gap-4">
            <a href="{% url 'home' %}" class="btn bg-slate-900 hover:bg-black text-white border-none h-14 rounded-2xl font-bold uppercase tracking-widest text-[10px]">
                Re-initialize Session
            </a>
            <p class="text-[9px] font-bold text-slate-300 uppercase tracking-[0.3em]">Code: ERR_INVALID_PAYLOAD</p>
        </div>
    </div>
</div>
{% endblock %}
